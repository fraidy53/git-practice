name: Frontend Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend   # frontend 폴더 기준

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 18 설치
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 의존성 설치
        run: npm install

      - name: 프론트엔드 빌드
        run: npm run build

      # 필요하다면 Docker 이미지 빌드 및 푸시도 추가 가능
      # - name: Docker 이미지 빌드
      #   run: docker build -t your-frontend-image .