name: Needs Job Order Example

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 테스트 실행
        run: echo "테스트 실행"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 빌드 실행
        run: echo "빌드 실행"

  notify:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 배포 완료 알림
        run: echo "배포 완료 알림"